name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen swiftlint swiftformat

      - name: Bootstrap
        run: make bootstrap

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test
